<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posts | Angel Naitbj</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#dbcfd8;
color:#111;
}

header{
background:#111;
color:white;
text-align:center;
padding:25px;
}

header h1{
margin:0;
color:gold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.post{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 5px 12px rgba(0,0,0,.15);
}

.post img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.post h2{
margin:0 0 10px;
color:#8b0000;
}

.reactions button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
background:#eee;
}

.reactions button:hover{
background:gold;
}

.reaction-list{
margin-top:10px;
margin-bottom:15px;
}

.comment-box input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.comment-box button{
margin-top:8px;
padding:10px 14px;
border:none;
background:#111;
color:white;
border-radius:8px;
cursor:pointer;
}

.comments{
margin-top:15px;
padding-top:10px;
border-top:1px solid #ddd;
}

.comments p{
background:#f4f4f4;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>ANGEL NAITBJ POSTS</h1>
<p>Philosophy • Spirituality • Science • Technology</p>
</header>

<div class="container">
<div id="postsContainer">Loading posts...</div>
</div>

<footer>
© 2026 angelnaitbj.org
</footer>

<script>
const supabaseUrl = "https://dvidfezruzupnxizexpl.supabase.co";
const supabaseKey = "sb_publishable_DZoa0xi7W7PqrPWkxJtqSw_rn0htocy";

const client = supabase.createClient(supabaseUrl, supabaseKey);


/* LOAD POSTS */
async function loadPosts(){

const box = document.getElementById("postsContainer");
box.innerHTML = "Loading posts...";

const { data, error } = await client
.from("posts")
.select("*")
.order("id",{ascending:false});

if(error){
box.innerHTML = "Failed to load posts";
console.log(error);
return;
}

if(!data || data.length===0){
box.innerHTML = "No posts yet";
return;
}

box.innerHTML = "";

for(const post of data){

box.innerHTML += `
<div class="post">

${post.image ? `<img src="${post.image}">` : ""}

<h2>${post.title || ""}</h2>

<p>${post.content || ""}</p>

<div class="reactions">
<button onclick="reactPost(${post.id},'❤️')">❤️</button>
<button onclick="reactPost(${post.id},'👍')">👍</button>
<button onclick="reactPost(${post.id},'🔥')">🔥</button>
<button onclick="reactPost(${post.id},'😂')">😂</button>
<button onclick="reactPost(${post.id},'🙏')">🙏</button>
</div>

<div id="reactions${post.id}" class="reaction-list">
Loading reactions...
</div>

<div class="comment-box">
<input id="comment${post.id}" placeholder="Write comment...">
<button onclick="addComment(${post.id})">Send</button>
</div>

<div class="comments" id="comments${post.id}">
Loading comments...
</div>

</div>
`;

loadComments(post.id);
loadReactions(post.id);
}

}


/* ADD COMMENT */
async function addComment(id){

let input = document.getElementById("comment"+id);
let text = input.value.trim();

if(text===""){
alert("Write comment first");
return;
}

const { error } = await client
.from("comments")
.insert([{post_id:id,comment:text}]);

if(error){
alert(error.message);
console.log(error);
return;
}

input.value="";
loadComments(id);

alert("Your comment was successfully submitted");
}


/* LOAD COMMENTS */
async function loadComments(id){

const box = document.getElementById("comments"+id);

const { data, error } = await client
.from("comments")
.select("*")
.eq("post_id",id)
.order("id",{ascending:false});

if(error){
box.innerHTML = "Unable to load comments";
console.log(error);
return;
}

box.innerHTML = `<h4>Comments (${data.length})</h4>`;

if(data.length===0){
box.innerHTML += "<p>No comments yet</p>";
return;
}

data.forEach(c=>{
box.innerHTML += `<p>💬 ${c.comment}</p>`;
});

}


/* ADD REACTION */
async function reactPost(id,emoji){

const { error } = await client
.from("reactions")
.insert([{post_id:id,emoji:emoji}]);

if(error){
alert(error.message);
console.log(error);
return;
}

loadReactions(id);

alert("Reaction added " + emoji);
}


/* LOAD REACTIONS */
async function loadReactions(id){

const box = document.getElementById("reactions"+id);

const { data, error } = await client
.from("reactions")
.select("*")
.eq("post_id",id);

if(error){
box.innerHTML = "Unable to load reactions";
console.log(error);
return;
}

if(!data || data.length===0){
box.innerHTML = "No reactions yet";
return;
}

let counts = {};

data.forEach(r=>{
counts[r.emoji] = (counts[r.emoji] || 0) + 1;
});

let html = "";

for(let emoji in counts){
html += `
<span style="
display:inline-block;
background:#f4f4f4;
padding:6px 10px;
margin:4px;
border-radius:20px;
font-weight:bold;
">
${emoji} ${counts[emoji]}
</span>
`;
}

box.innerHTML = html;
}


loadPosts();
</script>

</body>
</html>
